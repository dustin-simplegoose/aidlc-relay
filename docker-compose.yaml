services:
  relay:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      TEAM_API_KEYS: "dev-key"
      RELAY_LOG_FORMAT: "text"
      MAX_CONNECTIONS_PER_TEAM: "20"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Optional: Caddy for TLS in production-like local testing
